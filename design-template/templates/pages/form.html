{% extends "base.html" %}

{% block title %}إضافة عنصر{% endblock %}

{% block page_title %}إضافة عنصر جديد{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center gap-4">
        <a href="#" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
            <i data-lucide="arrow-right" class="w-5 h-5 text-slate-600"></i>
        </a>
        <p class="text-slate-500">إنشاء عنصر جديد</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <!-- Card 1: البيانات الأساسية -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h3 class="font-bold text-slate-800 mb-4">البيانات الأساسية</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">الاسم *</label>
                    <input 
                        type="text" 
                        name="name"
                        required
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="أدخل الاسم"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">الكود *</label>
                    <input 
                        type="text" 
                        name="code"
                        required
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="أدخل الكود"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">النوع</label>
                    <select 
                        name="type"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                    >
                        <option value="">-- اختر --</option>
                        <option value="1">النوع الأول</option>
                        <option value="2">النوع الثاني</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">القيمة</label>
                    <input 
                        type="number" 
                        name="amount"
                        step="0.01"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="0.00"
                    >
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">الوصف</label>
                    <textarea 
                        name="description"
                        rows="3"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="وصف اختياري..."
                    ></textarea>
                </div>
            </div>
        </div>

        <!-- Card 2: الإعدادات -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h3 class="font-bold text-slate-800 mb-4">الإعدادات</h3>
            <div class="space-y-3">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input 
                        type="checkbox" 
                        name="is_active"
                        checked
                        class="w-4 h-4 text-primary-600 border-slate-300 rounded focus:ring-primary-500"
                    >
                    <div>
                        <span class="font-medium text-slate-800">نشط</span>
                        <p class="text-sm text-slate-500">العنصر سيكون فعال ومتاح للاستخدام</p>
                    </div>
                </label>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input 
                        type="checkbox" 
                        name="is_featured"
                        class="w-4 h-4 text-primary-600 border-slate-300 rounded focus:ring-primary-500"
                    >
                    <div>
                        <span class="font-medium text-slate-800">مميز</span>
                        <p class="text-sm text-slate-500">عرض في القائمة المميزة</p>
                    </div>
                </label>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3">
            <a href="#" class="px-6 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
                إلغاء
            </a>
            <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
                حفظ
            </button>
        </div>
    </form>
</div>
{% endblock %}
