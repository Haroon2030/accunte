{% extends "base.html" %}

{% block title %}القائمة - النظام{% endblock %}

{% block page_title %}إدارة العناصر{% endblock %}

{% block content %}
<div class="space-y-4">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <p class="text-slate-500">إدارة وتنظيم العناصر</p>
        <a href="#" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i>
            إضافة جديد
        </a>
    </div>

    <!-- Table Card -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-600">#</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-600">الاسم</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-600">الكود</th>
                        <th class="px-4 py-3 text-center text-xs font-semibold text-slate-600">الحالة</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-600">تاريخ الإنشاء</th>
                        <th class="px-4 py-3 text-center text-xs font-semibold text-slate-600 w-24">إجراءات</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <!-- Sample Row 1 -->
                    <tr class="hover:bg-slate-50">
                        <td class="px-4 py-3 text-slate-600">1</td>
                        <td class="px-4 py-3 font-medium text-slate-800">عنصر أول</td>
                        <td class="px-4 py-3 text-slate-600 font-mono text-xs">001</td>
                        <td class="px-4 py-3 text-center">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">
                                نشط
                            </span>
                        </td>
                        <td class="px-4 py-3 text-slate-500 text-xs">2024/01/15</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center justify-center gap-1">
                                <a href="#" class="p-1.5 text-slate-600 hover:bg-slate-100 rounded transition-colors" title="تعديل">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </a>
                                <button class="p-1.5 text-red-600 hover:bg-red-50 rounded transition-colors" title="حذف">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <!-- Sample Row 2 -->
                    <tr class="hover:bg-slate-50">
                        <td class="px-4 py-3 text-slate-600">2</td>
                        <td class="px-4 py-3 font-medium text-slate-800">عنصر ثاني</td>
                        <td class="px-4 py-3 text-slate-600 font-mono text-xs">002</td>
                        <td class="px-4 py-3 text-center">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">
                                معطل
                            </span>
                        </td>
                        <td class="px-4 py-3 text-slate-500 text-xs">2024/01/10</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center justify-center gap-1">
                                <a href="#" class="p-1.5 text-slate-600 hover:bg-slate-100 rounded transition-colors" title="تعديل">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </a>
                                <button class="p-1.5 text-red-600 hover:bg-red-50 rounded transition-colors" title="حذف">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
