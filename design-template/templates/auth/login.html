{% extends "base_public.html" %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-primary-50 flex items-center justify-center p-4">
    <!-- Background Pattern -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-primary-200 rounded-full opacity-20 blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-primary-300 rounded-full opacity-20 blur-3xl"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/30">
                <i data-lucide="layout-dashboard" class="w-12 h-12 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">اسم النظام</h1>
            <p class="text-gray-500 mt-2">وصف مختصر للنظام</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-8">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">تسجيل الدخول</h2>
                <p class="text-gray-500 mt-1">أدخل بياناتك للوصول إلى حسابك</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم المستخدم</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-gray-400"></i>
                        </span>
                        <input 
                            type="text" 
                            name="username" 
                            required 
                            autocomplete="username"
                            class="block w-full pr-10 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                            placeholder="أدخل اسم المستخدم"
                        >
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                        </span>
                        <input 
                            type="password" 
                            name="password" 
                            required 
                            autocomplete="current-password"
                            class="block w-full pr-10 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                            placeholder="أدخل كلمة المرور"
                        >
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="remember" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <span class="mr-2 text-sm text-gray-600">تذكرني</span>
                    </label>
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-l from-primary-500 to-primary-700 text-white py-3 px-4 rounded-xl font-medium hover:from-primary-600 hover:to-primary-800 transition-all shadow-lg shadow-primary-500/30 flex items-center justify-center gap-2"
                >
                    <span>تسجيل الدخول</span>
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
