{% load custom_tags %}
<a
    href="{% url url %}"
    class="flex items-center gap-3 pr-3 pl-5 py-2 rounded-lg transition-colors text-sm {% active_class request path %}"
>
    <i data-lucide="{{ icon }}" class="w-4 h-4 flex-shrink-0"></i>
    <span class="font-medium">{{ label }}</span>
</a>
