{% load custom_tags %}
<a
    href="{% url url %}"
    class="nav-sub-link nav-link-adaptive {% nav_sub_active_class request path %}"
    title="{{ label }}"
>
    <span class="nav-sub-bullet" aria-hidden="true"></span>
    <i data-lucide="{{ icon }}" class="nav-sub-icon"></i>
    <span class="nav-text nav-sub-label">{{ label }}</span>
</a>
