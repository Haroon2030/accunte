{% load custom_tags %}
<a
    href="{% url url %}"
    class="nav-link nav-link-sub nav-link-adaptive text-sm {% active_class request path %}"
    title="{{ label }}"
>
    <i data-lucide="{{ icon }}" class="nav-icon w-4 h-4 flex-shrink-0"></i>
    <span class="nav-text font-medium">{{ label }}</span>
</a>
