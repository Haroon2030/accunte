{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام المدفوعات{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232563eb' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>م</text></svg>">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    
    <!-- Custom primary colors -->
    <style>
        .bg-primary-50 { background-color: #eff6ff; }
        .bg-primary-100 { background-color: #dbeafe; }
        .bg-primary-500 { background-color: #3b82f6; }
        .bg-primary-600 { background-color: #2563eb; }
        .bg-primary-700 { background-color: #1d4ed8; }
        .text-primary-500 { color: #3b82f6; }
        .text-primary-600 { color: #2563eb; }
        .text-primary-700 { color: #1d4ed8; }
        .border-primary-500 { border-color: #3b82f6; }
        .ring-primary-500 { --tw-ring-color: #3b82f6; }
        .focus\:ring-primary-500:focus { --tw-ring-color: #3b82f6; }
        .focus\:border-primary-500:focus { border-color: #3b82f6; }
        .hover\:bg-primary-700:hover { background-color: #1d4ed8; }
        .from-primary-500 { --tw-gradient-from: #3b82f6; }
        .to-primary-700 { --tw-gradient-to: #1d4ed8; }
    </style>
    
    <!-- HTMX -->
    <script src="/static/js/htmx.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="/static/js/alpine.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="/static/js/lucide.min.js"></script>
    
    <style>
        * { font-family: 'Cairo', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen">
    {% block content %}{% endblock %}
    
    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-4 left-4 z-50 space-y-2"></div>
    
    <script>
        lucide.createIcons();
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg fade-in flex items-center gap-2`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        {% if messages %}
            {% for message in messages %}
                showToast('{{ message }}', '{{ message.tags }}');
            {% endfor %}
        {% endif %}
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
