{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام المدفوعات{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232563eb' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>م</text></svg>">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    
    <!-- Custom primary colors -->
    <style>
        .bg-primary-50 { background-color: #eff6ff; }
        .bg-primary-100 { background-color: #dbeafe; }
        .bg-primary-200 { background-color: #bfdbfe; }
        .bg-primary-300 { background-color: #93c5fd; }
        .bg-primary-500 { background-color: #3b82f6; }
        .bg-primary-600 { background-color: #2563eb; }
        .bg-primary-700 { background-color: #1d4ed8; }
        .text-primary-500 { color: #3b82f6; }
        .text-primary-600 { color: #2563eb; }
        .text-primary-700 { color: #1d4ed8; }
        .border-primary-500 { border-color: #3b82f6; }
        .ring-primary-500 { --tw-ring-color: #3b82f6; }
        .focus\:ring-primary-500:focus { --tw-ring-color: #3b82f6; }
        .focus\:border-primary-500:focus { border-color: #3b82f6; }
        .hover\:bg-primary-700:hover { background-color: #1d4ed8; }
        .hover\:from-primary-700:hover { --tw-gradient-from: #1d4ed8; }
        .hover\:to-primary-600:hover { --tw-gradient-to: #2563eb; }
        .from-primary-500 { --tw-gradient-from: #3b82f6; }
        .from-primary-600 { --tw-gradient-from: #2563eb; }
        .to-primary-500 { --tw-gradient-to: #3b82f6; }
        .to-primary-600 { --tw-gradient-to: #2563eb; }
        .to-primary-700 { --tw-gradient-to: #1d4ed8; }
        .shadow-primary-500\/30 { box-shadow: 0 10px 15px -3px rgb(59 130 246 / 0.3), 0 4px 6px -4px rgb(59 130 246 / 0.3); }
        .shadow-primary-500\/40 { box-shadow: 0 10px 15px -3px rgb(59 130 246 / 0.4), 0 4px 6px -4px rgb(59 130 246 / 0.4); }
        .shadow-primary-500\/50 { box-shadow: 0 10px 15px -3px rgb(59 130 246 / 0.5), 0 4px 6px -4px rgb(59 130 246 / 0.5); }
        .shadow-primary-600\/50 { box-shadow: 0 10px 15px -3px rgb(37 99 235 / 0.5), 0 4px 6px -4px rgb(37 99 235 / 0.5); }
    </style>
    
    <!-- HTMX -->
    <script src="/static/js/htmx.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="/static/js/alpine.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="/static/js/lucide.min.js"></script>
    
    <style>
        * { 
            font-family: 'Cairo', sans-serif; 
        }
        html {
            font-size: 16px;
        }
        body {
            font-weight: 500;
            line-height: 1.6;
        }
        [x-cloak] { display: none !important; }
        
        /* Transitions */
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #toast-container { max-width: 22rem; width: calc(100vw - 2rem); }
        .app-toast {
            display: flex; align-items: flex-start; gap: 0.75rem;
            padding: 0.875rem 1rem; border-radius: 0.875rem;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 12px 32px -8px rgba(15, 23, 42, 0.25);
            animation: toastIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative; overflow: hidden;
        }
        .app-toast.toast-out { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-16px) scale(0.96); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(-12px) scale(0.95); } }
        .toast-icon-wrap { width: 2.25rem; height: 2.25rem; border-radius: 0.625rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .toast-success .toast-icon-wrap { background: #dcfce7; color: #16a34a; }
        .toast-error .toast-icon-wrap { background: #fee2e2; color: #dc2626; }
        .toast-warning .toast-icon-wrap { background: #fef3c7; color: #d97706; }
        .toast-info .toast-icon-wrap { background: #dbeafe; color: #2563eb; }
        .toast-title { font-weight: 700; font-size: 0.875rem; color: #0f172a; margin-bottom: 0.125rem; }
        .toast-message { font-size: 0.8125rem; color: #475569; line-height: 1.5; }
        .toast-close { margin-right: auto; padding: 0.125rem; border-radius: 0.375rem; color: #94a3b8; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
        .toast-close:hover { color: #475569; background: #f1f5f9; }
        .toast-progress { position: absolute; bottom: 0; right: 0; left: 0; height: 3px; transform-origin: right; animation: toastProgress 4.5s linear forwards; }
        .toast-success .toast-progress { background: linear-gradient(90deg, #22c55e, #16a34a); }
        .toast-error .toast-progress { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .toast-warning .toast-progress { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .toast-info .toast-progress { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        @keyframes toastProgress { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        .btn-loading { pointer-events: none; opacity: 0.85; }
        .btn-spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen">
    {% block content %}{% endblock %}
    
    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-6 left-4 z-[60] space-y-3"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });

        const TOAST_META = {
            success: { title: 'تم بنجاح', icon: 'check-circle' },
            error: { title: 'حدث خطأ', icon: 'x-circle' },
            warning: { title: 'تنبيه', icon: 'alert-triangle' },
            info: { title: 'معلومة', icon: 'info' }
        };

        function normalizeToastType(type) {
            if (!type) return 'info';
            if (type.includes('error')) return 'error';
            if (type.includes('success')) return 'success';
            if (type.includes('warning')) return 'warning';
            return 'info';
        }

        function dismissToast(toast) {
            if (!toast || toast.dataset.dismissed) return;
            toast.dataset.dismissed = '1';
            toast.classList.add('toast-out');
            setTimeout(() => toast.remove(), 280);
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container || !message) return;
            const toastType = normalizeToastType(type);
            const meta = TOAST_META[toastType] || TOAST_META.info;
            const toast = document.createElement('div');
            toast.className = `app-toast toast-${toastType}`;
            toast.innerHTML = `
                <div class="toast-icon-wrap"><i data-lucide="${meta.icon}" class="w-5 h-5"></i></div>
                <div class="flex-1 min-w-0 pt-0.5"><p class="toast-title">${meta.title}</p><p class="toast-message"></p></div>
                <button type="button" class="toast-close" aria-label="إغلاق"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="toast-progress"></div>`;
            toast.querySelector('.toast-message').textContent = message;
            toast.querySelector('.toast-close').addEventListener('click', () => dismissToast(toast));
            container.appendChild(toast);
            if (typeof lucide !== 'undefined') lucide.createIcons();
            setTimeout(() => dismissToast(toast), 4500);
        }
        window.showToast = showToast;

        document.addEventListener('submit', function(e) {
            const form = e.target;
            if (!form || form.tagName !== 'FORM') return;
            const btn = form.querySelector('button[type="submit"], input[type="submit"]');
            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('btn-loading');
            if (btn.tagName === 'INPUT') btn.value = 'جاري التنفيذ...';
            else btn.innerHTML = '<span class="btn-spinner ml-2"></span> جاري التنفيذ...';
        });

        {% if messages %}
            {% for message in messages %}
                showToast('{{ message|escapejs }}', '{{ message.tags }}');
            {% endfor %}
        {% endif %}
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
